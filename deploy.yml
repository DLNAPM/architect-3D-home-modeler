name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Trigger the workflow on pushes to the main branch
  workflow_dispatch: # Allow manual triggering

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install # Assumes you have a package.json
      
      - name: Build the site
        # This command assumes you are using Vite. The GITHUB_REPOSITORY variable
        # ensures the base path is set correctly for GitHub Pages.
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Upload production-ready build files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # The folder produced by the build step

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
